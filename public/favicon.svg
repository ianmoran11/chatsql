<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="#1e1b4b"/>
  <!-- Database cylinder top -->
  <ellipse cx="16" cy="11" rx="9" ry="3.5" fill="#6366f1"/>
  <!-- Database body -->
  <rect x="7" y="11" width="18" height="12" fill="#4f46e5"/>
  <!-- Database cylinder bottom -->
  <ellipse cx="16" cy="23" rx="9" ry="3.5" fill="#4338ca"/>
  <!-- Middle data-layer line -->
  <ellipse cx="16" cy="17" rx="9" ry="3.5" fill="none" stroke="#a5b4fc" stroke-width="0.8" opacity="0.6"/>
  <!-- Query indicator: small chat bubble -->
  <circle cx="25.5" cy="7" r="5" fill="#10b981"/>
  <text x="25.5" y="10" text-anchor="middle" fill="white" font-size="7" font-family="sans-serif" font-weight="bold">?</text>
