<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="#1e1b4b"/>
  <!-- Database cylinder top -->
  <ellipse cx="14" cy="10" rx="8" ry="3" fill="#6366f1"/>
  <!-- Database body -->
  <rect x="6" y="10" width="16" height="10" fill="#4f46e5"/>
  <!-- Database cylinder bottom -->
  <ellipse cx="14" cy="20" rx="8" ry="3" fill="#4338ca"/>
  <!-- Middle layer stripe -->
  <ellipse cx="14" cy="15" rx="8" ry="3" fill="none" stroke="#a5b4fc" stroke-width="0.7" opacity="0.5"/>
  <!-- Chat bubble (top-right) -->
  <rect x="20" y="2" width="11" height="8" rx="2" fill="#10b981"/>
  <polygon points="22,10 20,13 25,10" fill="#10b981"/>
  <!-- SQL text in bubble -->
  <text x="25.5" y="8.5" text-anchor="middle" fill="white" font-size="4.5" font-family="monospace" font-weight="bold">SQL</text>
</svg>
