<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="ChatSQL — Ask questions in plain English and get instant SQL results from your SQLite database." />
    <meta name="application-name" content="ChatSQL" />
    <meta property="og:title" content="ChatSQL — Query Your Database" />
    <meta property="og:description" content="A conversational AI interface for querying SQLite databases using natural language." />
    <meta name="theme-color" content="#4f46e5" />
    <title>ChatSQL — Query Your Database</title>
    <script>
      // Apply saved theme before React mounts to prevent flash of unstyled content
      (function () {
        var t = localStorage.getItem('chatsql_theme');
        if (t && t !== 'obsidian') {
          document.documentElement.setAttribute('data-theme', t);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
